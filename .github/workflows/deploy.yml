name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: dravidamodel2026-site

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy static assets to S3 (long cache)
        working-directory: app
        env:
          BUCKET: ${{ env.S3_BUCKET }}
        run: |
          aws s3 sync out/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

      - name: Deploy HTML and JSON to S3 (no cache)
        working-directory: app
        env:
          BUCKET: ${{ env.S3_BUCKET }}
        run: |
          aws s3 sync out/ "s3://${BUCKET}/" \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Wait for CloudFront propagation
        run: sleep 30

      - name: Run smoke tests
        env:
          SITE_URL: ${{ secrets.CLOUDFRONT_DOMAIN }}
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh "https://${SITE_URL}"

      - name: Deployment summary
        env:
          CF_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}
        run: |
          echo "## Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Site deployed to CloudFront: https://${CF_DOMAIN}" >> "$GITHUB_STEP_SUMMARY"
          echo "Build time: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
